services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - teacher-exam-private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/${GITHUB_REPOSITORY}/teacher-exam-api:${IMAGE_TAG:-latest}
    command: ["pnpm", "--filter", "@teacher-exam/db", "db:migrate"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - teacher-exam-private
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrate

  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/teacher-exam-api:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      APP_URL: https://${DOMAIN}
      BETTER_AUTH_URL: https://${API_DOMAIN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      MINIMAX_ANTHROPIC_BASE_URL: ${MINIMAX_ANTHROPIC_BASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      AI_MODEL: ${AI_MODEL}
      AI_DISCUSSION_MODEL: ${AI_DISCUSSION_MODEL}
      UPLOAD_DIR: /app/uploads
      API_PORT: 3001
    volumes:
      - uploads_data:/app/uploads
    networks:
      - edge
      - teacher-exam-private
    labels:
      caddy: ${API_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 3001}}"
      caddy.reverse_proxy.transport: http
      caddy.reverse_proxy.transport.read_timeout: 5m
      caddy.reverse_proxy.transport.write_timeout: 5m
      caddy.reverse_proxy.transport.dial_timeout: 30s
      caddy.reverse_proxy.flush_interval: "-1"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/teacher-exam-web:${IMAGE_TAG:-latest}
    restart: always
    networks:
      - edge
    labels:
      caddy: ${DOMAIN}
      caddy.reverse_proxy: "{{upstreams 80}}"

volumes:
  db_data: {}
  uploads_data: {}

networks:
  edge:
    external: true
  teacher-exam-private:
    name: teacher-exam-private
    driver: bridge
