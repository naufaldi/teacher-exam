name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VITE_API_URL: /api
  VITE_APP_ORIGIN: http://localhost:5173
  VITE_DELIVERY_ENABLED: "true"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Effect style check
        run: pnpm effect:check

      - name: Type check
        run: pnpm type-check

      - name: Shared test
        run: pnpm --filter @teacher-exam/shared test

      - name: API test
        run: pnpm --filter @teacher-exam/api test

  db-migrate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: school_exam
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: school_exam
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U school_exam"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: DB package tests
        run: pnpm --filter @teacher-exam/db test

      - name: Apply migrations on empty database
        env:
          DATABASE_URL: postgresql://school_exam:ci_test_password@localhost:5432/school_exam
        run: pnpm --filter @teacher-exam/db db:migrate

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Web build
        run: pnpm --filter @teacher-exam/web build

      - name: Web test
        run: pnpm --filter @teacher-exam/web test
